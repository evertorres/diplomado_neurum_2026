<section class="slide" id="slide2">
    <div class="slide-content">
        <h2 class="slide-title">¿Por qué interoperabilidad?</h2>
        
        <div style="position: relative; width: 100%; height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-top: var(--space-md);">
            <!-- Image Container -->
            <div style="position: relative; width: 100%; height: calc(100% - 60px); display: flex; justify-content: center; align-items: center; background: #f8fafc; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0;">
                
                <!-- Base Image: Islas -->
                <img src="images/islas_base.png" alt="Islas Base" class="slide-image" style="position: absolute; max-height: 100%; max-width: 100%; z-index: 0; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));">
                
                <!-- Step 1: Sistemas (EMR, LIS, etc) -->
                <img src="images/islas_sistemas.png" id="slide2-img1" alt="Sistemas" class="slide-image" style="position: absolute; max-height: 100%; max-width: 100%; z-index: 1; opacity: 0; transition: opacity 0.3s ease;">
                
                <!-- Step 2: Conectividad (Flechas) -->
                <img src="images/islas_conectividad.png" id="slide2-img2" alt="Conectividad" class="slide-image" style="position: absolute; max-height: 100%; max-width: 100%; z-index: 2; opacity: 0; transition: opacity 0.3s ease;">
            </div>

            <!-- Slider Control -->
            <div style="width: 80%; max-width: 500px; margin-top: var(--space-xl); text-align: center; background: white; padding: 15px 25px; border-radius: 50px; box-shadow: var(--shadow-md); border: 1px solid #e2e8f0;">
                <div style="display: flex; justify-content: mb-2; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;">
                    <span style="flex: 1; text-align: left;">Silos</span>
                    <span style="flex: 1; text-align: center;">Sistemas</span>
                    <span style="flex: 1; text-align: right;">Conexión</span>
                </div>
                <input type="range" id="interop-slider" min="0" max="2" value="0" step="0.01" style="width: 100%; cursor: pointer; accent-color: var(--color-primary);">
            </div>
        </div>

        <div class="callout" style="margin-top: var(--space-md); max-width: 800px; margin-left: auto; margin-right: auto;">
            <p style="margin: 0; font-style: italic; color: var(--color-primary); text-align: center;">
                "Los ecosistemas de salud tradicionales se asemejan a <strong>islas de información</strong> aisladas. Sistemas robustos localmente, pero incapaces de comunicarse a través del mar que los separa."
            </p>
        </div>
    </div>
</section>
